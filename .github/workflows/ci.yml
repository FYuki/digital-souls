name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: python3 -m pip install -r backend/requirements.txt -r backend/requirements-dev.txt
      - run: npm ci --prefix frontend
      - run: npm --prefix frontend run install:browser
      - run: npm run check
      - run: npm run build
      - run: npm run test:unit
      - run: npm run test:module
      - run: npm run test:e2e:mocked
